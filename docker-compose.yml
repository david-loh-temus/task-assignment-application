services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-task_assignment}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-task_assignment}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      backend-migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@db:5432/task_assignment}
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4000/health >/dev/null 2>&1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - '${BACKEND_PORT:-4000}:4000'

  # One-shot service for running Prisma migrations & seed against the DB.
  # This service uses the backend build (dev target) so Prisma CLI and devDeps
  # are available. Run it once before starting the production backend, or use
  # it from CI to apply migrations.
  backend-migrate:
    build:
      context: ./backend
      target: dev
    restart: 'no'
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@db:5432/task_assignment}
    command: sh -c "npm ci && npm run prisma:generate && npm run prisma:migrate:deploy && npm run prisma:seed || true"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1 >/dev/null 2>&1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - '${FRONTEND_PORT:-8080}:80'

volumes:
  postgres-data:
